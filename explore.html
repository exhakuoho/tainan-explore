<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五大主題場景 — 藝饗台南 2.0</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
.page-hero {
  background: var(--coffee-dark);
  color: var(--cream);
  padding: 56px 0 48px;
}
.page-hero h1 { font-family: var(--font-serif); font-size: clamp(28px,4vw,40px); letter-spacing: 0.04em; margin-bottom: 8px; }
.page-hero .lead { font-size: 14px; color: oklch(82% 0.04 75); }
.page-hero .eyebrow { font-size: 11px; letter-spacing: 0.22em; color: var(--gold); margin-bottom: 12px; }

.explore-layout {
  display: grid;
  grid-template-columns: 1fr 480px;
  gap: 0;
  min-height: 720px;
}
@media (max-width: 1100px) {
  .explore-layout { grid-template-columns: 1fr; }
  #map { height: 400px; }
}

#map {
  width: 100%; height: 720px;
  border-right: 1px solid var(--border);
}

.spot-panel {
  background: var(--cream);
  padding: 32px;
  height: 720px;
  overflow-y: auto;
}
@media (max-width: 1100px) { .spot-panel { height: auto; } }
.spot-panel::-webkit-scrollbar { width: 6px; }
.spot-panel::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 3px; }

.panel-title {
  font-family: var(--font-serif);
  font-size: 20px; font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.panel-sub { font-size: 13px; color: var(--ink-mute); margin-bottom: 20px; }

/* spot row */
.spot-row {
  background: white;
  border-radius: var(--radius-md);
  padding: 18px;
  display: flex; gap: 16px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid transparent;
  text-decoration: none; color: inherit;
}
.spot-row:hover, .spot-row.active {
  border-color: var(--brick);
  box-shadow: var(--shadow-sm);
}
.spot-row-num {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--brick); color: var(--cream);
  font-family: var(--font-serif); font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.spot-row-info { flex: 1; min-width: 0; }
.spot-row-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px; gap: 8px;
}
.spot-row-name {
  font-family: var(--font-serif); font-size: 16px; font-weight: 700;
  letter-spacing: 0.02em;
}
.spot-row-theme {
  font-size: 10px; letter-spacing: 0.1em;
  color: var(--gold-deep); text-transform: uppercase;
  font-weight: 600;
}
.spot-row-desc { font-size: 12px; color: var(--ink-mute); line-height: 1.55; margin-bottom: 8px; }
.spot-row-meta { font-size: 11px; color: var(--coffee); display: flex; gap: 10px; }

.spot-row-status {
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0;
  width: 80px;
}
.spot-row-progress-text {
  font-size: 10px; color: var(--coffee); letter-spacing: 0.06em;
  white-space: nowrap;
}
.spot-row-progress {
  width: 100%; height: 4px;
  background: var(--cream-mid);
  border-radius: 2px;
  overflow: hidden;
}
.spot-row-progress-bar {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
}
.spot-row-badge {
  font-size: 16px;
  filter: grayscale(1) opacity(0.3);
}
.spot-row-badge.earned { filter: none; }

.legend {
  background: white;
  padding: 12px 18px;
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  border: 1px solid var(--border-soft);
  display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
  font-size: 12px;
}
.legend-item { display: flex; align-items: center; gap: 6px; color: var(--ink-soft); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<section class="page-hero">
  <div class="container">
    <div class="eyebrow">FIVE THEMES · 五大主題場景</div>
    <h1>府城五種文化記憶</h1>
    <p class="lead">點擊地圖上的場域或下方卡片，了解每個主題的故事，並進入掃描 QR Code 解鎖任務。</p>
  </div>
</section>

<div class="explore-layout">
  <div id="map"></div>
  <div class="spot-panel">
    <div class="panel-title">場域列表</div>
    <div class="panel-sub" id="panel-sub">共 5 個場域 · 點擊查看任務</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#A0522D;"></div>摩登生活</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7B1E1E;"></div>文教精神</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8B4513;"></div>歷史轉折</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5C7A3E;"></div>庶民娛樂</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B8860B;"></div>街區技藝</div>
    </div>
    <div id="spot-list"></div>
  </div>
</div>

<div id="footer-mount"></div>

<script src="app.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = APP.renderNav('explore');
document.getElementById('footer-mount').innerHTML = APP.renderFooter();

// route info if user has selected one
const state = APP.loadState();
if (state.selectedRoute) {
  const r = APP.getRoute(state.selectedRoute);
  document.getElementById('panel-sub').innerHTML = `當前路線：<strong style="color:var(--brick);">${r.name}</strong> · ${r.spots.length} 個場域`;
}

// Render list
function renderList() {
  const s = APP.loadState();
  const html = APP.SPOTS.map((spot, i) => {
    const total = APP.TASKS[spot.id].length;
    const done = APP.getCompletedCount(spot.id);
    const pct = total ? (done / total * 100) : 0;
    const earned = !!s.badges[spot.id];
    const inRoute = s.selectedRoute && APP.getRoute(s.selectedRoute).spots.includes(spot.id);
    return `
      <a href="spot/${spot.id}.html" class="spot-row" data-id="${spot.id}">
        <div class="spot-row-num" style="background:${spot.color};">${i+1}</div>
        <div class="spot-row-info">
          <div class="spot-row-top">
            <div class="spot-row-name">${spot.name}</div>
            ${inRoute ? '<span class="chip chip-brick" style="font-size:9px;padding:2px 7px;">路線</span>' : ''}
          </div>
          <div class="spot-row-theme">${spot.theme} · ${spot.era}</div>
          <div class="spot-row-desc" style="margin-top:6px;">${spot.desc}</div>
          <div class="spot-row-meta">
            <span>⏱ ${spot.duration}</span>
            <span>📋 ${total} 項任務</span>
          </div>
        </div>
        <div class="spot-row-status">
          <div class="spot-row-progress-text">${done}/${total} 任務</div>
          <div class="spot-row-progress"><div class="spot-row-progress-bar" style="width:${pct}%;"></div></div>
          <div class="spot-row-badge ${earned ? 'earned' : ''}" title="${spot.badge}">🏅</div>
        </div>
      </a>`;
  }).join('');
  document.getElementById('spot-list').innerHTML = html;

  // hover sync
  document.querySelectorAll('.spot-row').forEach(row => {
    row.addEventListener('mouseenter', () => focusMarker(row.dataset.id));
  });
}

// Map
const map = L.map('map', { scrollWheelZoom: true }).setView([22.997, 120.197], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

const markers = {};
APP.SPOTS.forEach((s, i) => {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:44px; height:44px;
      background:${s.color};
      border:3px solid white;
      border-radius:50% 50% 50% 0;
      box-shadow: 0 4px 12px oklch(0% 0 0 / 0.35);
      transform: rotate(-45deg);
      display: flex; align-items:center; justify-content:center;
    "><span style="transform:rotate(45deg); font-family:'Noto Serif TC',serif; font-size:14px; color:white; font-weight:700;">${i+1}</span></div>`,
    iconSize: [44, 44],
    iconAnchor: [22, 44],
    popupAnchor: [0, -46],
  });
  const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div style="font-family:'Noto Serif TC',serif; font-size:15px; font-weight:700; color:${s.color}; margin-bottom:4px;">${s.name}</div>
    <div style="color:var(--ink-soft); font-size:12px; margin-bottom:6px;">${s.theme} · ${s.era}</div>
    <div style="margin-top:8px;">
      <a href="spot/${s.id}.html" style="background:${s.color}; color:white; padding:4px 10px; border-radius:3px; font-size:12px; text-decoration:none; font-weight:600;">查看任務 ›</a>
    </div>
  `);
  markers[s.id] = m;
});

function focusMarker(id) {
  const s = APP.getSpot(id);
  if (!s) return;
  map.setView([s.lat, s.lng], 15, { animate: true });
  markers[id].openPopup();
  document.querySelectorAll('.spot-row').forEach(x => x.classList.toggle('active', x.dataset.id === id));
}

renderList();

document.addEventListener('state-changed', () => {
  renderList();
  document.getElementById('nav-mount').innerHTML = APP.renderNav('explore');
});
</script>

</body>
</html>
