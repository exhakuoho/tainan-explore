<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的集點 — 藝饗台南 2.0</title>
<link rel="stylesheet" href="style.css">
<style>
.page-hero {
  background: linear-gradient(135deg, var(--coffee), var(--coffee-dark));
  color: var(--cream);
  padding: 56px 0 56px;
  position: relative; overflow: hidden;
}
.page-hero::before {
  content: ''; position: absolute;
  top: -100px; right: -100px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, oklch(70% 0.12 78 / 0.18), transparent 70%);
}

.points-hero {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;
  position: relative; z-index: 1;
}
@media (max-width: 800px) { .points-hero { grid-template-columns: 1fr; } }

.score-card {
  background: oklch(100% 0 0 / 0.06);
  border: 1px solid oklch(100% 0 0 / 0.15);
  border-radius: var(--radius-lg);
  padding: 28px;
}
.score-card.primary {
  background: var(--gold);
  color: var(--coffee-dark);
  border: none;
  position: relative;
  overflow: hidden;
}
.score-card.primary::before {
  content: ''; position: absolute;
  inset: 6px;
  border: 1px dashed var(--coffee-dark);
  border-radius: var(--radius-md);
  pointer-events: none;
  opacity: 0.4;
}
.score-eyebrow {
  font-size: 11px; letter-spacing: 0.2em;
  opacity: 0.85; margin-bottom: 10px;
}
.score-big {
  font-family: var(--font-serif);
  font-size: 64px; font-weight: 900;
  line-height: 1;
  letter-spacing: 0.04em;
  display: flex; align-items: baseline; gap: 8px;
}
.score-big small { font-size: 18px; font-weight: 600; opacity: 0.7; }
.score-sub { font-size: 12px; opacity: 0.85; margin-top: 8px; }

.next-reward {
  display: flex; align-items: center; gap: 14px;
  margin-top: 18px;
  background: oklch(100% 0 0 / 0.15);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
}
.next-reward-icon { font-size: 22px; }
.next-reward-info { flex: 1; min-width: 0; }
.next-reward-name { font-size: 13px; font-weight: 600; }
.next-reward-need { font-size: 11px; opacity: 0.8; margin-top: 2px; }

/* Badges */
.badges-wrap {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
}
@media (max-width: 900px) { .badges-wrap { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 520px) { .badges-wrap { grid-template-columns: repeat(2, 1fr); } }
.badge-card {
  background: white;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-soft);
  padding: 20px;
  text-align: center;
  position: relative;
  transition: transform 0.2s;
}
.badge-card.earned {
  border-color: var(--gold);
  background: linear-gradient(180deg, var(--cream), white);
  box-shadow: 0 4px 12px oklch(70% 0.12 78 / 0.2);
}
.badge-medal {
  width: 80px; height: 80px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: var(--cream-mid);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  filter: grayscale(1) opacity(0.4);
  position: relative;
}
.badge-card.earned .badge-medal {
  background: linear-gradient(135deg, var(--gold), var(--gold-deep));
  filter: none;
  box-shadow: 0 4px 12px oklch(0% 0 0 / 0.2);
}
.badge-card.earned .badge-medal::after {
  content: ''; position: absolute; inset: -4px;
  border: 2px solid var(--brick);
  border-radius: 50%;
  opacity: 0.3;
}
.badge-name {
  font-family: var(--font-serif);
  font-size: 14px; font-weight: 700;
  color: var(--ink); margin-bottom: 4px;
}
.badge-spot { font-size: 11px; color: var(--coffee); letter-spacing: 0.04em; }
.badge-status {
  font-size: 10px;
  margin-top: 8px;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  letter-spacing: 0.06em;
}
.badge-status.locked { background: var(--cream-mid); color: var(--ink-mute); }
.badge-status.earned { background: var(--green); color: white; }

/* Task list */
.task-list-wrap {
  background: white;
  border-radius: var(--radius-md);
  padding: 24px;
  border: 1px solid var(--border-soft);
}
.tl-spot {
  margin-bottom: 24px;
  padding-bottom: 24px;
  border-bottom: 1px dashed var(--border);
}
.tl-spot:last-child { margin-bottom: 0; padding-bottom: 0; border: none; }
.tl-spot-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.tl-spot-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-weight: 700; font-size: 13px;
  color: white;
  flex-shrink: 0;
}
.tl-spot-name { font-family: var(--font-serif); font-size: 18px; font-weight: 700; }
.tl-spot-progress { font-size: 12px; color: var(--ink-mute); margin-left: auto; }
.tl-task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0;
  font-size: 13px;
}
.tl-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
  color: white;
}
.tl-check.done { background: var(--green); border-color: var(--green); }
.tl-q { flex: 1; color: var(--ink-soft); }
.tl-q.done { text-decoration: line-through; color: var(--ink-mute); }
.tl-pts {
  background: var(--cream); padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--coffee);
  font-weight: 600;
}

/* Stat row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 32px;
}
@media (max-width: 800px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-cell {
  background: white;
  border-radius: var(--radius-md);
  padding: 20px;
  border: 1px solid var(--border-soft);
}
.stat-num { font-family: var(--font-serif); font-size: 28px; font-weight: 700; color: var(--brick); line-height: 1; }
.stat-label { font-size: 12px; color: var(--coffee); letter-spacing: 0.08em; margin-top: 6px; }

/* Reset button */
.reset-btn {
  background: transparent;
  border: 1px dashed var(--ink-mute);
  color: var(--ink-mute);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  margin-left: 10px;
}
.reset-btn:hover { border-color: var(--brick); color: var(--brick); }
</style>
</head>
<body>

<div id="nav-mount"></div>

<section class="page-hero">
  <div class="container">
    <div class="points-hero">
      <div class="score-card primary">
        <div class="score-eyebrow">MY POINTS · 我的點數</div>
        <div class="score-big" id="points-big">0<small>點</small></div>
        <div class="score-sub" id="points-sub">尚未開始累積</div>
        <div class="next-reward" id="next-reward"></div>
      </div>
      <div class="score-card">
        <div class="score-eyebrow">BADGES · 收集徽章</div>
        <div class="score-big" id="badges-big">0<small>/ 5 枚</small></div>
        <div class="score-sub">完成場域所有任務取得徽章</div>
        <div style="margin-top:18px; display:flex; gap:6px;" id="badges-strip"></div>
      </div>
      <div class="score-card">
        <div class="score-eyebrow">ROUTE · 當前路線</div>
        <div id="route-big" style="margin-top:6px;">
          <div style="font-family:var(--font-serif); font-size:24px; font-weight:700;" id="route-name">尚未選擇</div>
          <div class="score-sub" id="route-detail">先去挑選一條探索路線</div>
        </div>
        <a id="route-cta" href="routes.html" class="btn btn-gold btn-sm" style="margin-top:18px;">選擇路線 ›</a>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="section-header">
      <div>
        <div class="section-eyebrow">PROGRESS · 探索進度</div>
        <h2 class="section-title">我的府城探索</h2>
      </div>
      <button class="reset-btn" onclick="resetAll()">重設所有進度</button>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="section-header" style="margin-top:32px;">
      <div>
        <div class="section-eyebrow">BADGES · 五枚文化徽章</div>
        <h2 class="section-title" style="font-size:24px;">徽章收集</h2>
      </div>
    </div>
    <div class="badges-wrap" id="badges-wrap"></div>

    <div class="section-header" style="margin-top:48px;">
      <div>
        <div class="section-eyebrow">TASKS · 任務進度</div>
        <h2 class="section-title" style="font-size:24px;">五大主題任務追蹤</h2>
      </div>
    </div>
    <div class="task-list-wrap" id="task-list-wrap"></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="app.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = APP.renderNav('points');
document.getElementById('footer-mount').innerHTML = APP.renderFooter();

function render() {
  const s = APP.loadState();

  document.getElementById('points-big').innerHTML = `${s.points}<small>點</small>`;

  const next = APP.getNextReward();
  if (next) {
    document.getElementById('points-sub').textContent = `下一個獎勵還差 ${next.cost - s.points} 點`;
    document.getElementById('next-reward').innerHTML = `
      <div class="next-reward-icon">${next.icon}</div>
      <div class="next-reward-info">
        <div class="next-reward-name">${next.name}</div>
        <div class="next-reward-need">需 ${next.cost} 點 · 還差 ${next.cost - s.points}</div>
      </div>
    `;
  } else {
    document.getElementById('points-sub').textContent = '所有獎勵都已可兌換！';
    document.getElementById('next-reward').innerHTML = `
      <div class="next-reward-icon">🏆</div>
      <div class="next-reward-info">
        <div class="next-reward-name">已達最高兌換門檻</div>
        <div class="next-reward-need">前往兌換你最想要的獎勵吧</div>
      </div>
    `;
  }

  const badgeCount = Object.keys(s.badges).length;
  document.getElementById('badges-big').innerHTML = `${badgeCount}<small>/ 5 枚</small>`;
  document.getElementById('badges-strip').innerHTML = APP.SPOTS.map(sp => `
    <div title="${sp.badge}" style="width:30px; height:30px; border-radius:50%; background:${s.badges[sp.id] ? 'var(--coffee-dark)':'oklch(100% 0 0 / 0.15)'}; color:${s.badges[sp.id] ? 'var(--gold)':'oklch(100% 0 0 / 0.4)'}; display:flex; align-items:center; justify-content:center; font-size:13px; border:1px solid oklch(100% 0 0 / 0.2);">🏅</div>
  `).join('');

  if (s.selectedRoute) {
    const r = APP.getRoute(s.selectedRoute);
    document.getElementById('route-name').textContent = r.name;
    document.getElementById('route-detail').textContent = `${r.spots.length} 個場域 · ${r.duration}`;
    document.getElementById('route-cta').textContent = '查看場域 →';
    document.getElementById('route-cta').href = 'explore.html';
  } else {
    document.getElementById('route-name').textContent = '尚未選擇';
    document.getElementById('route-detail').textContent = '先去挑選一條探索路線';
  }

  // Stats
  const totalTasks = APP.SPOTS.reduce((sum, sp) => sum + APP.TASKS[sp.id].length, 0);
  const doneTasks = APP.SPOTS.reduce((sum, sp) => sum + APP.getCompletedCount(sp.id), 0);
  const redeemed = s.redeemed.length;
  const diy = s.diyBookings.length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-cell"><div class="stat-num">${doneTasks}/${totalTasks}</div><div class="stat-label">任務完成數</div></div>
    <div class="stat-cell"><div class="stat-num">${badgeCount}</div><div class="stat-label">文化徽章</div></div>
    <div class="stat-cell"><div class="stat-num">${redeemed}</div><div class="stat-label">已兌換獎勵</div></div>
    <div class="stat-cell"><div class="stat-num">${diy}</div><div class="stat-label">DIY 預約</div></div>
  `;

  // Badges grid
  document.getElementById('badges-wrap').innerHTML = APP.SPOTS.map(sp => {
    const earned = !!s.badges[sp.id];
    return `
      <div class="badge-card ${earned ? 'earned' : ''}">
        <div class="badge-medal">🏅</div>
        <div class="badge-name">${sp.badge}</div>
        <div class="badge-spot">${sp.name}</div>
        <div class="badge-status ${earned ? 'earned' : 'locked'}">${earned ? '✓ 已取得' : '尚未取得'}</div>
      </div>
    `;
  }).join('');

  // Task list
  document.getElementById('task-list-wrap').innerHTML = APP.SPOTS.map((sp, i) => {
    const tasks = APP.TASKS[sp.id];
    const done = APP.getCompletedCount(sp.id);
    return `
      <div class="tl-spot">
        <div class="tl-spot-head">
          <div class="tl-spot-num" style="background:${sp.color};">${i+1}</div>
          <div class="tl-spot-name">${sp.name}</div>
          <div class="tl-spot-progress">${done}/${tasks.length} 完成 · ${tasks.reduce((a,t)=>a+t.points,0)} 點上限</div>
        </div>
        ${tasks.map((t, ti) => {
          const isDone = !!s.completedTasks[`${sp.id}-${ti}`];
          return `
            <div class="tl-task-row">
              <div class="tl-check ${isDone ? 'done' : ''}">${isDone ? '✓' : ''}</div>
              <div class="tl-q ${isDone ? 'done' : ''}">${t.q}</div>
              <div class="tl-pts">+${t.points} 點</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }).join('');
}

function resetAll() {
  if (confirm('確定要重設所有進度嗎？此操作無法復原。')) {
    APP.resetState();
    render();
  }
}
window.resetAll = resetAll;

render();
document.addEventListener('state-changed', () => {
  document.getElementById('nav-mount').innerHTML = APP.renderNav('points');
  render();
});
</script>

</body>
</html>
